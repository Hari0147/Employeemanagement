apiVersion: apps/v1
kind: Deployment
metadata: 
 name: python-app-deployment
 labels:
  app: pyb
spec:
 replicas: 2
 strategy: 
  type: RollingUpdate
 selector:
  matchLabels:
   app: pyb
 template:
  metadata:
   name: python-app-pods
   labels:
    app: pyb
  spec:
   containers:
    - name: python-app-container
      image: hari00147/python-application
      ports:
       - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
 name: pythonsvc
spec:
 type: NodePort
 selector:
  app: pyb
 ports:
  - port: 80
    targetPort: 8080
